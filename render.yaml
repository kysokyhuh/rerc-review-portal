# Render Blueprint — free-tier frontend + backend for the first Render/Neon test deployment.
# See https://render.com/docs/blueprint-spec for full reference.

services:
  - type: web
    name: rerc-web
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false            # set manually after the backend URL exists

  - type: web
    name: rerc-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm ci && npx prisma generate && npm run build
    preDeployCommand: cd backend && npx prisma migrate deploy
    startCommand: cd backend && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false            # use the direct Neon connection string for the first test deploy
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: urerb-review-portal
      - key: JWT_AUDIENCE
        value: urerb-review-portal-users
      - key: CORS_ORIGINS
        sync: false            # set manually after the frontend URL exists
