# Render Blueprint — single-origin free-tier backend + frontend on one Web Service.
# See https://render.com/docs/blueprint-spec for full reference.

services:
  - type: web
    name: rerc-review-portal
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm ci && npx prisma generate && npm run build
    preDeployCommand: cd backend && npx prisma migrate deploy
    startCommand: cd backend && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false            # use the direct Neon connection string
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: urerb-review-portal
      - key: JWT_AUDIENCE
        value: urerb-review-portal-users
      - key: APP_BASE_URL
        sync: false            # set to the Web Service public URL for same-origin routing and links
      - key: CORS_ORIGINS
        sync: false            # set to the same public URL, plus any optional extra callers
